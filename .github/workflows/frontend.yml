name: Frontend CI

on:
  push:
    branches: [ main, dev, phase-10-production-testing ]
  pull_request:
    branches: [ main, dev, phase-10-production-testing ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - run: npm run build
