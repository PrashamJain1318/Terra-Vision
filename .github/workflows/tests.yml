name: Test Automation Suite

on:
  push:
    branches: [ main, dev, phase-10-production-testing ]
  pull_request:
    branches: [ main, dev, phase-10-production-testing ]

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Verify Builds
        run: |
          cd frontend && npm install && npm run build
